spring:
    application:
        name: mic-paymentservice
    profiles:
        active: ${PROFILE:local},kibana
    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterWrite=300s
    jpa:
        properties:
            hibernate:
                default_schema: public
        open-in-view: false
    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
    kafka:
        listener:
            observation-enabled: true
        template:
            observation-enabled: true

server:
    port: 6007

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    tracing:
        sampling:
            probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
    otlp:
        tracing:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
    pattern:
        level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
    level:
        com.backandwhite: DEBUG

---
spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}

payment:
    stripe:
        api-key: ${STRIPE_API_KEY:}
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    paypal:
        client-id: ${PAYPAL_CLIENT_ID:}
        client-secret: ${PAYPAL_CLIENT_SECRET:}
        base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
    crypto:
        provider: coinbase
        coinbase:
            api-key: ${COINBASE_API_KEY:}
            webhook-secret: ${COINBASE_WEBHOOK_SECRET:}
            base-url: ${COINBASE_BASE_URL:https://api.commerce.coinbase.com}
