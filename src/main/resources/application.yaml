spring:
    application:
        name: mic-paymentservice
    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterWrite=300s
    jpa:
        properties:
            hibernate:
                default_schema: public
        open-in-view: false
    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml

server:
    port: 6007

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics

logging:
    level:
        com.backandwhite: DEBUG
